<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil | FAS</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-orange-50 via-white to-orange-100 text-slate-800">

<header class="bg-white/80 backdrop-blur-md shadow-md border-b border-slate-200">
    <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="bg-orange-500 p-2 rounded-xl shadow-md">🍴</div>
            <div>
                <h1 class="font-bold text-lg">Restaurante FAS</h1>
                <p class="text-xs text-slate-500">Panel de Cliente</p>
            </div>
        </div>

        <div class="flex items-center gap-3">
            <span class="text-sm font-medium">Hola, Roberto Díaz</span>
            <div class="w-10 h-10 bg-orange-500 text-white rounded-full flex items-center justify-center font-bold shadow">
                R
            </div>
        </div>
    </div>
</header>

<main class="max-w-6xl mx-auto px-6 py-12">

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">

        <!-- PERFIL -->
        <aside>
            <div class="bg-white/80 p-6 rounded-3xl shadow-xl border text-center">

                <!-- FOTO CON CAMBIO -->
                <div class="relative w-28 h-28 mx-auto mb-4">

                    <!-- Avatar -->
                    <div class="w-28 h-28 bg-gradient-to-br from-orange-400 to-orange-600 text-white rounded-full flex items-center justify-center text-4xl font-bold shadow">
                        RD
                    </div>

                    <!-- Botón cambiar -->
                    <label class="absolute bottom-0 right-0 bg-black/70 text-white text-[10px] px-2 py-1 rounded cursor-pointer hover:bg-black">
                        Cambiar
                        <input type="file" class="hidden" accept="image/*">
                    </label>

                </div>

                <h2 class="text-xl font-bold">Roberto Díaz</h2>
                <p class="text-sm text-slate-500 mb-4">Cliente VIP desde 2025</p>

                <span class="bg-orange-100 text-orange-700 text-xs px-3 py-1 rounded-full font-semibold">
                    ⭐ Cliente Frecuente
                </span>
            </div>
        </aside>

        <!-- CONTENIDO -->
        <section class="lg:col-span-2 space-y-8">

            <!-- EDITAR DATOS -->
            <div class="bg-white/80 p-8 rounded-3xl shadow-xl border">
                <h3 class="text-2xl font-extrabold mb-6">Editar Mis Datos</h3>

                <form class="space-y-4">
                    <input type="text" value="Roberto Díaz" class="w-full p-3 rounded-xl border focus:ring-2 focus:ring-orange-400 outline-none">
                    <input type="email" value="roberto@email.com" class="w-full p-3 rounded-xl border focus:ring-2 focus:ring-orange-400 outline-none">
                    <input type="text" value="4431234567" class="w-full p-3 rounded-xl border focus:ring-2 focus:ring-orange-400 outline-none">

                    <button class="w-full bg-orange-500 text-white py-3 rounded-xl font-bold hover:bg-orange-600 transition">
                        Guardar Cambios
                    </button>
                </form>
            </div>

            <!-- PREFERENCIAS -->
            <div class="bg-white/80 p-8 rounded-3xl shadow-xl border">
                <h3 class="text-2xl font-extrabold mb-6">Preferencias</h3>

                <form class="space-y-6">

                    <!-- Tipo de comida -->
                    <div>
                        <label class="font-semibold text-sm">🍽️ Tipo de comida favorita</label>
                        <select class="w-full mt-2 p-3 rounded-xl border focus:ring-2 focus:ring-orange-400 outline-none">
                            <option>Mexicana</option>
                            <option>Italiana</option>
                            <option>Vegetariana</option>
                            <option>Rápida</option>
                        </select>
                    </div>

                    <!-- Restricciones -->
                    <div>
                        <label class="font-semibold text-sm">⚠️ Restricciones alimenticias</label>
                        <div class="mt-2 flex flex-wrap gap-3 text-sm">
                            <label class="flex items-center gap-2">
                                <input type="checkbox"> Sin gluten
                            </label>
                            <label class="flex items-center gap-2">
                                <input type="checkbox"> Vegano
                            </label>
                            <label class="flex items-center gap-2">
                                <input type="checkbox"> Sin lactosa
                            </label>
                        </div>
                    </div>

                    <!-- Mesa -->
                    <div>
                        <label class="font-semibold text-sm">📍 Preferencia de mesa</label>
                        <div class="mt-2 flex gap-6">
                            <label class="flex items-center gap-2">
                                <input type="radio" name="mesa"> Terraza 🌿
                            </label>
                            <label class="flex items-center gap-2">
                                <input type="radio" name="mesa"> Interior 🏠
                            </label>
                        </div>
                    </div>

                    <!-- Notas -->
                    <div>
                        <label class="font-semibold text-sm">📝 Notas adicionales</label>
                        <textarea rows="3" placeholder="Ej: cerca de ventana..."
                            class="w-full mt-2 p-3 rounded-xl border focus:ring-2 focus:ring-orange-400 outline-none"></textarea>
                    </div>

                    <button class="w-full bg-orange-500 text-white py-3 rounded-xl font-bold hover:bg-orange-600 transition">
                        Guardar Preferencias
                    </button>

                </form>
            </div>

            <!-- HISTORIAL -->
            <div class="bg-white/80 p-8 rounded-3xl shadow-xl border">
                <h3 class="text-2xl font-extrabold mb-6">Historial de Visitas</h3>

                <div class="space-y-4">
                    <div class="flex justify-between items-center p-4 bg-slate-50 rounded-xl hover:bg-orange-50 transition">
                        <div>
                            <p class="font-semibold">12/02/2026</p>
                            <p class="text-sm text-slate-500">Mesa M5</p>
                        </div>

                        <span class="bg-emerald-100 text-emerald-600 text-xs px-3 py-1 rounded-full font-bold">
                            ✔ Finalizada
                        </span>
                    </div>
                </div>

            </div>

        </section>

    </div>

</main>

</body>
</html>
